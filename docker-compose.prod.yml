services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: sqlite:////app/data/motionguard.db
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
      YOLO_MODEL_PATH: /yolov8n.pt
      YOLO_CONFIG_DIR: /app/Ultralytics
      STORAGE_DIR: /app/storage
      LOGS_DIR: /app/logs
    volumes:
      - motionguard_data:/app/data
      - motionguard_storage:/app/storage
      - motionguard_logs:/app/logs
      - ./secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  motionguard_data:
  motionguard_storage:
  motionguard_logs:
